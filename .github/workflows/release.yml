name: Release

on:
  push:
    branches:
      # - 'v*' # Trigger on version tags like v1.0.0
  workflow_dispatch: {}

jobs:
  build-and-release:
    # Grant explicit write permissions for releases to this job
    permissions:
      contents: write

    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/actions-setup@v6

      - name: Install dependencies
        run: pnpm ci

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm

      - name: Build assets (minify, gzip, brotli)
        run: pnpm run build

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*
